apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicdapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cicdapp
  template:
    metadata:
      labels:
        app: cicdapp
    spec:
      containers:
      - name: cicdapp
        image: dhanuvagman123/cicdapp
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: cicdapp
spec:
  type: NodePort
  selector:
    app: cicdapp
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30007